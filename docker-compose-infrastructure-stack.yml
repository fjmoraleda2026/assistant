version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: assistant-postgres
    environment:
      POSTGRES_DB: assistant_pro
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: password_seguro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/support/db:/docker-entrypoint-initdb.d
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: assistant-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: assistant-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: assistant-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped

  kafka-init:
    image: confluentinc/cp-kafka:latest
    container_name: kafka-topic-creator
    depends_on:
      - kafka
    entrypoint: /bin/sh -c
    command: |
      "sleep 10 && 
       kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic telegram-inbound --partitions 1 --replication-factor 1 &&
       kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic telegram-outbound --partitions 1 --replication-factor 1"
    restart: on-failure

volumes:
  postgres_data:
  redis_data:

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: assistant-postgres
    environment:
      POSTGRES_DB: assistant_pro
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: password_seguro
    ports:
      - "5432:5432"
    volumes:
      - ./src/main/resources/support/db:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: assistant-redis
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: assistant-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-init:
    image: confluentinc/cp-kafka:latest
    container_name: kafka-topic-creator
    depends_on:
      - kafka
    entrypoint: /bin/sh -c
    command: |
      "sleep 10 && 
       kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic telegram-inbound --partitions 1 --replication-factor 1 &&
       kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic telegram-outbound --partitions 1 --replication-factor 1"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assistant-app
    depends_on:
      - postgres
      - redis
      - kafka-init
    ports:
      - "8080:8080"
    environment:
      # Base de Datos (crítico: debe apuntar a DNS del contenedor)
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/assistant_pro
      SPRING_DATASOURCE_USERNAME: user_admin
      SPRING_DATASOURCE_PASSWORD: password_seguro
      # Redis (crítico: debe apuntar a DNS del contenedor)
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      # Kafka (crítico: debe apuntar a DNS del contenedor)
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_CONSUMER_BOOTSTRAP_SERVERS: kafka:9092
      # Resto de parámetros usan valores por defecto de application.yml
    restart: unless-stopped
